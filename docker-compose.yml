services:
  db:
    image: postgres:15-alpine
    container_name: project_04-db
    environment:
      POSTGRES_DB: "notes_db_04"
      POSTGRES_USER: "notes_user_04"
      POSTGRES_PASSWORD: "password123"
    volumes:
      - pgdata_04:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5404:5432" # Проброс: ваш командный порт СУБД наружу -> 5432 внутрь
    networks:
      - project_04-network

  backend:
    build:
      context: ./backend
    container_name: project_04-backend
    environment:
      DB_HOST: db # Имя сервиса БД в сети Compose
      DB_NAME: "notes_db_04"
      DB_USER: "notes_user_04"
      DB_PASS: "password123"
    ports:
      - "5004:5000" # Проброс: ваш командный порт бэкенда наружу -> 5000 внутрь
    depends_on:
      - db
    networks:
      - project_04-network

  nginx:
    image: nginx:alpine
    container_name: project_04-nginx
    ports:
      - "8004:80" # Проброс: ваш командный порт веб-сайта наружу -> 80 внутрь
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - project_04-network

volumes:
  pgdata_04:

networks:
  project_04-network:
    name: project_04-network
