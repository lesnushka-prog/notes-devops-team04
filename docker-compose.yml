services:
  db:
    image: postgres:15-alpine
    container_name: project_04-db
    environment:
      POSTGRES_DB: "notes_db_04"
      POSTGRES_USER: "notes_user_04"
      POSTGRES_PASSWORD: "password123"
    volumes:
      - pgdata_04:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5404:5432"
    networks:
      - project_04-network

  backend:
    build:
      context: ./backend
    container_name: project_04-backend
    environment:
      DB_HOST: db
      DB_NAME: "notes_db_04"
      DB_USER: "notes_user_04"
      DB_PASS: "password123"
    ports:
      - "5004:5000"
    depends_on:
      - db
    networks:
      - project_04-network

  nginx:
    image: nginx:alpine
    container_name: project_04-nginx
    ports:
      - "8004:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - project_04-network

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: project_04-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - promdata_04:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9004:9090"
    depends_on:
      - backend
    networks:
      - project_04-network

  grafana:
    image: grafana/grafana:10.0.0
    container_name: project_04-grafana
    ports:
      - "3004:3000"
    volumes:
      - grafanadata_04:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - project_04-network

volumes:
  pgdata_04:
  promdata_04:
  grafanadata_04:

networks:
  project_04-network:
    name: project_04-network
